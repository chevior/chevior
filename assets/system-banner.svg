<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Chethan N — Software Engineer Profile</title>
  <desc id="desc">A dark futuristic developer status interface with purple and cyan accents.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.52" stop-color="#11152a"/>
      <stop offset="1" stop-color="#090d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.52" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glowPurple">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".24"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".2"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#8b5cf6" stroke-opacity=".07"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="22" y="22" width="1156" height="276" rx="24"/>
    </clipPath>
  </defs>

  <rect width="1200" height="320" rx="28" fill="#060912"/>
  <g filter="url(#shadow)">
    <rect x="22" y="22" width="1156" height="276" rx="24" fill="url(#panel)" stroke="#29304a"/>
  </g>
  <g clip-path="url(#frameClip)">
    <rect x="22" y="22" width="1156" height="276" fill="url(#grid)"/>
    <circle cx="205" cy="30" r="250" fill="url(#glowPurple)"/>
    <circle cx="1050" cy="290" r="270" fill="url(#glowCyan)"/>
    <path d="M22 93H335l22-22h486l22 22h313" fill="none" stroke="url(#accent)" stroke-opacity=".55"/>
    <path d="M22 267h236l18-18h648l18 18h236" fill="none" stroke="url(#accent)" stroke-opacity=".32"/>
    <path d="M1010 22l168 168v108h-88L814 22z" fill="#22d3ee" fill-opacity=".025"/>
    <path d="M22 224L224 22h96L44 298H22z" fill="#8b5cf6" fill-opacity=".035"/>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(68 58)">
      <rect width="148" height="30" rx="15" fill="#151b31" stroke="#8b5cf6" stroke-opacity=".6"/>
      <circle cx="17" cy="15" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;.25;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <text x="30" y="20" fill="#cbd5e1" font-size="12" font-weight="600" letter-spacing="1.5">SYSTEM ONLINE</text>
    </g>

    <text x="68" y="151" fill="#f8fafc" font-size="50" font-weight="800" letter-spacing="1">CHETHAN N</text>
    <rect x="68" y="170" width="510" height="4" rx="2" fill="url(#accent)" filter="url(#textGlow)"/>
    <text x="68" y="207" fill="#94a3b8" font-size="19" font-weight="500" letter-spacing="3">FULL STACK ENGINEER · BACKEND FOCUSED</text>
    <text x="68" y="242" fill="#67e8f9" font-size="13" font-weight="600" letter-spacing="2">BENGALURU / INDIA</text>

    <g transform="translate(850 72)">
      <path d="M0 22V0h22M260 0h22v22M282 132v22h-22M22 154H0v-22" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <text x="24" y="39" fill="#64748b" font-size="11" letter-spacing="2">CURRENT CLASS</text>
      <text x="24" y="70" fill="#f8fafc" font-size="23" font-weight="700">ENGINEER</text>
      <text x="24" y="101" fill="#64748b" font-size="11" letter-spacing="2">PRIMARY ATTRIBUTE</text>
      <text x="24" y="130" fill="#22d3ee" font-size="17" font-weight="700">BUILD / SHIP / LEARN</text>
    </g>
  </g>

  <circle cx="1150" cy="50" r="3" fill="#22d3ee"/>
  <circle cx="1136" cy="50" r="3" fill="#8b5cf6"/>
  <circle cx="1122" cy="50" r="3" fill="#334155"/>
</svg>
