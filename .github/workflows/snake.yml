name: Generate contribution snake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: chevior
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2322d3ee&color_dots=%230b1020,%231e1b4b,%234c1d95,%237c3aed,%2322d3ee
            dist/github-contribution-grid-snake.svg?color_snake=%238b5cf6

      - name: Publish generated assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
